<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        body {
            background: #111;
            color: #eee;
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            padding: 15px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100vh;
            box-sizing: border-box;
        }

        .btn {
            background: #222;
            border: 1px solid #444;
            color: #dfdfdf;
            padding: 10px;
            cursor: pointer;
            user-select: none;
            font-size: 14px;
            transition: 0.2s;
            outline: none;
            width: 100%;
        }

        .btn:hover {
            background: #262626;
            border-color: #666;
        }

        .btn:active {
            background: #2e2e2e;
        }

        #result {
            font-family: Segoe UI;
            font-weight: 300;
            margin: 16px 0;
            font-size: 18px;
            color: #dfdfdf;
        }
    </style>
</head>

<body>
    <button class="btn" onclick="generate()">GENERATE</button>
    <div id="result">----------</div>
    <button class="btn" onclick="copyResult()">COPY</button>

    <script>
        const { ipcRenderer } = require('electron');

        const classLength = 10;

        function generate() {
            const chars = 'abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
            let res = chars.charAt(Math.floor(Math.random() * 52));

            for (let i = 1; i < classLength; i++) {
                res += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            document.getElementById('result').innerText = res;
            ipcRenderer.send('copy', res);
        }

        function copyResult() {
            const text = document.getElementById('result').innerText;
            if (text !== "----------") {
                ipcRenderer.send('copy', text);
            }
        }
    </script>
</body>

</html>
